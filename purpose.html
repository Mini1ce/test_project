<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIFit AR - Select Purpose</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', 'Kanit', sans-serif;
            background: linear-gradient(160deg, #EEF2FF 0%, #F0FBFF 50%, #F5F0FF 100%);
            min-height: 100vh; display: flex; flex-direction: column;
        }
        body::before {
            content: ''; position: fixed; top: -120px; right: -120px;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 0;
        }
        header {
            padding: 20px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, rgba(59,95,219,0.1) 0%, rgba(139,92,246,0.08) 100%);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(79,126,245,0.2);
            position: relative; z-index: 10;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #4F7EF5 30%, #8B5CF6 60%, #06B6D4 85%, transparent 100%);
        }
        .logo {
            background: linear-gradient(135deg, #3B5FDB, #8B5CF6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; font-size: 24px; font-weight: 700;
        }
        .tech-badges { display: flex; gap: 8px; }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-gemini { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; }
        .badge-firebase { background: linear-gradient(135deg, #fee2e2, #fecaca); color: #991b1b; }
        .nav-bar {
            padding: 14px 6%; display: flex; align-items: center; gap: 8px;
            cursor: pointer; color: #5B6490; font-size: 15px; font-weight: 500;
            background: rgba(255,255,255,0.5); backdrop-filter: blur(6px);
            border-bottom: 1px solid rgba(79,126,245,0.05); position: relative; z-index: 5;
        }
        .nav-bar:hover { color: #4F7EF5; }
        main {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; padding: 40px 6%; gap: 30px;
            position: relative; z-index: 1;
        }
        .section-title {
            color: #1A1F4E; font-size: 24px; font-weight: 700; text-align: center;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px; width: 100%; max-width: 780px;
        }
        .purpose-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.9), rgba(238,242,255,0.8));
            border: 1.5px solid rgba(79,126,245,0.12);
            border-radius: 24px;
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 20px rgba(79,126,245,0.06);
        }
        .purpose-card:hover {
            border-color: rgba(79,126,245,0.4);
            background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(224,234,255,0.9));
            transform: translateY(-6px);
            box-shadow: 0 12px 32px rgba(79,126,245,0.15);
        }
        .purpose-card.active {
            border-color: #4F7EF5;
            background: linear-gradient(145deg, rgba(224,234,255,0.95), rgba(237,229,255,0.9));
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(79,126,245,0.2), 0 0 0 1px rgba(79,126,245,0.15) inset;
        }
        .card-icon { font-size: 42px; margin-bottom: 14px; }
        .card-title { font-size: 17px; font-weight: 600; color: #1A1F4E; }
        .purpose-card.active .card-title { color: #4F7EF5; }
        .btn-next {
            width: 100%; max-width: 380px;
            background: rgba(255,255,255,0.8);
            color: #4F7EF5; border: 1.5px solid rgba(79,126,245,0.35);
            padding: 18px; border-radius: 50px;
            font-size: 18px; font-weight: 600; font-family: 'Outfit', sans-serif;
            cursor: pointer; transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(79,126,245,0.08);
        }
        .btn-next:hover { background: linear-gradient(135deg, #4F7EF5, #7B5CF6); color: white; border-color: transparent; transform: translateY(-2px); }
        footer {
            position: relative;
            background: linear-gradient(135deg, rgba(59,95,219,0.1), rgba(139,92,246,0.08));
            backdrop-filter: blur(8px);
            border-top: 2px solid rgba(79,126,245,0.15);
            padding: 18px; text-align: center; color: #4F6AC0; font-size: 12px;
            font-weight: 500;
            position: relative; z-index: 1;
        }
        footer::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #4F7EF5, #8B5CF6, #06B6D4, transparent);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">AIFit AR</div>
        <div class="tech-badges">
            <span class="badge badge-gemini">✨ Gemini</span>
            <span class="badge badge-firebase">🔥 Firebase</span>
        </div>
    </header>
    <div class="nav-bar" onclick="window.history.back()">◀ ย้อนกลับ</div>
    <main>
        <div class="section-title">คุณต้องการรองเท้าสำหรับอะไร?</div>
        <div class="card-grid">
            <div class="purpose-card" onclick="selectPurpose(this)">
                <div class="card-icon">🏃‍♂️</div>
                <div class="card-title">วิ่ง / กีฬา</div>
            </div>
            <div class="purpose-card" onclick="selectPurpose(this)">
                <div class="card-icon">👟</div>
                <div class="card-title">ใส่เที่ยว / ไลฟ์สไตล์</div>
            </div>
            <div class="purpose-card" onclick="selectPurpose(this)">
                <div class="card-icon">🏋️‍♂️</div>
                <div class="card-title">ฟิตเนส / เทรนนิ่ง</div>
            </div>
        </div>
        <button class="btn-next" onclick="window.location.href='price.html'">ถัดไป →</button>
    </main>
    <footer>Computer Science, RMUTT | © 2026 ShoeSpace Project</footer>
    <script>
        function selectPurpose(el) {
            document.querySelectorAll('.purpose-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
