<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIFit AR - Full Screen Version</title>
    <style>
        /* CSS: ปรับให้ขยายเต็มหน้าจอ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Kanit', sans-serif;
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header: ปรับให้ขยายเต็มความกว้าง */
        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .logo {
            color: #00008B;
            font-size: 28px;
            font-weight: bold;
        }

        .tech-logos {
            display: flex;
            gap: 20px;
        }

        .tech-logos span {
            font-size: 16px;
            font-weight: 500;
            color: #444;
        }

        /* Main Content: ปรับให้ยืดหยุ่นเต็มหน้าจอ */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 5%;
        }

        /* พื้นที่แสดงผล AR ขยายใหญ่ขึ้น */
        .ar-display {
            width: 100%;
            max-width: 1000px;
            /* กำหนดความกว้างสูงสุดเพื่อความสวยงาม */
            height: 450px;
            background: #f8fbff;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            border: 2px solid #eef2f6;
        }

        .ar-display img {
            height: 85%;
            max-width: 90%;
            object-fit: contain;
        }

        .pagination {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #d1d9e6;
            border-radius: 50%;
        }

        .dot.active {
            background: #3F51B5;
        }

        /* Slogan & Buttons */
        .slogan {
            color: #00008B;
            font-size: 20px;
            text-align: center;
            margin: 30px 0;
            font-weight: 500;
        }

        .btn-group {
            width: 100%;
            max-width: 500px;
            display: flex;
            gap: 20px;
        }

        .btn-scan {
            flex: 2;
            background: #6495ED;
            color: white;
            border: none;
            padding: 20px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-scan:hover {
            background: #4169E1;
            transform: translateY(-2px);
        }

        .btn-view {
            flex: 1;
            background: transparent;
            color: #333;
            border: 1px solid #6495ED;
            padding: 20px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-view:hover {
            background: #f5f5f5;
        }

        /* Footer ปรับให้เต็มความกว้างด้านล่าง */
        footer {
            background: #E5E5E5;
            padding: 25px;
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: auto;
        }

        /* ปรับแต่งสำหรับมือถือ */
        @media (max-width: 600px) {
            .btn-group {
                flex-direction: column;
            }

            .ar-display {
                height: 300px;
            }

            .logo {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">AIFit AR</div>
        <div class="tech-logos">
            <span>✨ Gemini</span>
            <span>🔥 Firebase</span>
        </div>
    </header>

    <main>
        <div class="ar-display">
            <img src="image.png" alt="AR Foot Visualization">
        </div>

        <div class="pagination">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>

        <div class="slogan">
            วัดไซส์แม่นยำ มั่นใจทุกย่างก้าว ด้วย AI & AR
        </div>

        <div class="btn-group">
            <button class="btn-scan" onclick="location.href='setup.html'">
                <span>📷</span> เริ่มสแกนเท้า
            </button>
        </div>
    </main>

    <footer>
        Computer Science, RMUTT | © 2026 ShoeSpace Project
    </footer>

</body>

</html>
