<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIFit AR</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', 'Kanit', sans-serif;
            background: linear-gradient(160deg, #EEF2FF 0%, #F0FBFF 50%, #F5F0FF 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        body::before {
            content: '';
            position: fixed;
            top: -150px; right: -150px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -100px; left: -100px;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(6,182,212,0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        header {
            padding: 20px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, rgba(59,95,219,0.1) 0%, rgba(139,92,246,0.08) 100%);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(79,126,245,0.2);
            position: relative; z-index: 10;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #4F7EF5 30%, #8B5CF6 60%, #06B6D4 85%, transparent 100%);
        }
        .logo {
            background: linear-gradient(135deg, #3B5FDB, #8B5CF6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 26px; font-weight: 700; letter-spacing: -0.5px;
        }
        .tech-badges { display: flex; gap: 10px; }
        .badge { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-gemini { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; border: 1px solid rgba(245,158,11,0.3); }
        .badge-firebase { background: linear-gradient(135deg, #fee2e2, #fecaca); color: #991b1b; border: 1px solid rgba(239,68,68,0.3); }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 6%;
            position: relative; z-index: 1;
        }
        .ar-display {
            width: 100%; max-width: 900px; height: 420px;
            background: linear-gradient(145deg, rgba(255,255,255,0.9), rgba(238,242,255,0.8));
            border-radius: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 20px 60px rgba(79,126,245,0.12), 0 0 0 1px rgba(79,126,245,0.1);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }
        .ar-display::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #4F7EF5, #8B5CF6, #06B6D4, transparent);
        }
        .ar-corner {
            position: absolute;
            width: 24px; height: 24px;
            border-color: rgba(79,126,245,0.5);
            border-style: solid;
        }
        .ar-corner.tl { top: 16px; left: 16px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
        .ar-corner.tr { top: 16px; right: 16px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
        .ar-corner.bl { bottom: 16px; left: 16px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
        .ar-corner.br { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }
        .ar-label {
            position: absolute; top: 16px;
            left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(79,126,245,0.15), rgba(139,92,246,0.15));
            border: 1px solid rgba(79,126,245,0.2);
            color: #4F7EF5; font-size: 11px; font-weight: 600;
            padding: 4px 12px; border-radius: 20px; letter-spacing: 1px; text-transform: uppercase;
        }
        .ar-display img {
            height: 82%; max-width: 88%; object-fit: contain;
            filter: drop-shadow(0 10px 30px rgba(79,126,245,0.2));
        }
        .pagination { display: flex; gap: 8px; margin-top: 22px; align-items: center; }
        .dot { width: 8px; height: 8px; background: #CBD5F0; border-radius: 50%; transition: all 0.3s; }
        .dot.active { width: 24px; border-radius: 4px; background: linear-gradient(90deg, #4F7EF5, #8B5CF6); }
        .slogan { font-size: 18px; font-weight: 500; color: #3B4A8A; margin: 28px 0; text-align: center; }
        .btn-scan {
            background: linear-gradient(135deg, #4F7EF5 0%, #7B5CF6 100%);
            color: white; border: none;
            padding: 18px 50px; border-radius: 50px;
            font-size: 17px; font-weight: 600; font-family: 'Outfit', sans-serif;
            display: flex; align-items: center; gap: 10px; cursor: pointer;
            box-shadow: 0 8px 24px rgba(79,126,245,0.35);
            transition: all 0.3s;
        }
        .btn-scan:hover { transform: translateY(-3px); box-shadow: 0 14px 32px rgba(79,126,245,0.45); }
        footer {
            position: relative;
            background: linear-gradient(135deg, rgba(59,95,219,0.1), rgba(139,92,246,0.08));
            backdrop-filter: blur(8px);
            border-top: 2px solid rgba(79,126,245,0.15);
            padding: 18px; text-align: center; color: #4F6AC0; font-size: 12px;
            font-weight: 500;
            position: relative; z-index: 1;
        }
        footer::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #4F7EF5, #8B5CF6, #06B6D4, transparent);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">AIFit AR</div>
        <div class="tech-badges">
            <span class="badge badge-gemini">✨ Gemini</span>
            <span class="badge badge-firebase">🔥 Firebase</span>
        </div>
    </header>
    <main>
        <div class="ar-display">
            <div class="ar-corner tl"></div><div class="ar-corner tr"></div>
            <div class="ar-corner bl"></div><div class="ar-corner br"></div>
            <span class="ar-label">AR Preview</span>
            <img src="image.png" alt="AR Foot Visualization">
        </div>
        <div class="pagination">
            <span class="dot active"></span><span class="dot"></span><span class="dot"></span>
        </div>
        <div class="slogan">วัดไซส์แม่นยำ มั่นใจทุกย่างก้าว ด้วย AI & AR</div>
        <button class="btn-scan" onclick="location.href='setup.html'">
            <span>📷</span> เริ่มสแกนเท้า
        </button>
    </main>
    <footer>Computer Science, RMUTT | © 2026 ShoeSpace Project</footer>
</body>
</html>
