<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIFit AR - AI Advisor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Kanit', sans-serif; }
        body { background-color: #f5f7fa; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Header */
        header { padding: 20px 5%; background: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .logo { color: #00008B; font-size: 24px; font-weight: bold; }
        .nav-bar { padding: 15px 5%; display: flex; align-items: center; gap: 10px; cursor: pointer; background: white; }

        /* Chat Container */
        main { flex: 1; display: flex; flex-direction: column; padding: 20px 5%; max-width: 800px; margin: 0 auto; width: 100%; }
        
        .chat-box { flex: 1; display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; overflow-y: auto; }

        /* Bubble Styles */
        .message { max-width: 80%; padding: 12px 18px; border-radius: 20px; font-size: 15px; line-height: 1.5; }
        .ai-msg { background: #E3F2FD; color: #1A237E; align-self: flex-start; border-bottom-left-radius: 5px; border: 1px solid #bbdefb; }
        .user-msg { background: #6495ED; color: white; align-self: flex-end; border-bottom-right-radius: 5px; }

        /* Input Area */
        .chat-input-area { display: flex; gap: 10px; background: white; padding: 15px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input { flex: 1; border: none; outline: none; padding: 5px 10px; font-size: 16px; }
        .btn-send { background: #6495ED; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        footer { padding: 15px; text-align: center; color: #999; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">AIFit AR</div>
        <div class="tech-logos" style="color: #666; font-size: 14px;">Powered by Gemini ✦</div>
    </header>

    <div class="nav-bar" onclick="window.history.back()">
        <span style="font-size: 20px;">◀</span> ย้อนกลับ
    </div>

    <main>
        <div class="chat-box" id="chatBox">
            <div class="message ai-msg">
                สวัสดีครับ! ผมคือ AI Advisor ยินดีที่ได้แนะนำรองเท้า Asics Gel-Kayano 30 ให้คุณครับ มีคำถามเพิ่มเติมเกี่ยวกับไซส์หรือการใช้งานไหมครับ?
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="พิมพ์คำถามของคุณที่นี่...">
            <button class="btn-send" onclick="sendMessage()">ส่ง</button>
        </div>
    </main>

    <footer>
        Computer Science, RMUTT | © 2026 ShoeSpace Project
    </footer>

    <script>
       function sendMessage() {
    const input = document.getElementById('userInput');
    const chatBox = document.getElementById('chatBox');
    const userText = input.value.trim();

    if (userText !== "") {
        // 1. แสดงข้อความของ User
        const userDiv = document.createElement('div');
        userDiv.className = 'message user-msg';
        userDiv.textContent = userText;
        chatBox.appendChild(userDiv);
        
        // 2. แสดงสถานะ "กำลังวิเคราะห์" (หลังจาก 1 วินาที)
        setTimeout(() => {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai-msg';
            loadingDiv.id = 'loading-status';
            loadingDiv.textContent = "กำลังวิเคราะห์คำถามของคุณด้วย Gemini AI...";
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }, 1000);

        // 3. แสดงคำตอบจริง (หลังจาก 4 วินาที - ปรับเวลาให้กระชับขึ้น)
        setTimeout(() => {
            // ลบสถานะ "กำลังวิเคราะห์" ออกก่อนแสดงคำตอบ
            const loadingStatus = document.getElementById('loading-status');
            if (loadingStatus) loadingStatus.remove();

            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai-msg';
            
            // Logic การตอบคำถามเบื้องต้น (Mockup)
            if (userText.includes("นุ่ม")) {
                aiDiv.textContent = "นุ่มแน่นอนครับ! เนื่องจากพื้นรองเท้า Asics รุ่นนี้มีเทคโนโลยี PureGEL™ ที่ช่วยดูดซับแรงกระแทกได้ดีเยี่ยม เหมาะสำหรับการวิ่งระยะไกลและช่วยลดความเมื่อยล้าตามสรีระเท้าของคุณครับ";
            } else if (userText.includes("ราคา") || userText.includes("กี่บาท")) {
                aiDiv.textContent = "ข้อมูลราคาจะถูกดึงมาจาก Firebase ของเราครับ เบื้องต้นรุ่นนี้ราคาประมาณ 6,xxx บาท คุณสามารถเช็คโปรโมชั่นล่าสุดได้ที่ปุ่มดูรองเท้าครับ";
            } else {
                aiDiv.textContent = "เป็นคำถามที่ดีครับ! จากสัดส่วนเท้ากว้าง 10.2 ซม. ของคุณ รุ่นนี้ถูกออกแบบมาเพื่อความสบายเป็นหลัก มีข้อสงสัยส่วนไหนเพิ่มเติมไหมครับ?";
            }

            chatBox.appendChild(aiDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }, 4000);

        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;
    }
}
    </script>
</body>
</html>
